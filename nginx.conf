worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    # Logging
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Gzip
    gzip                on;
    gzip_vary           on;
    gzip_min_length     1024;
    gzip_proxied        any;
    gzip_comp_level     6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    server {
        listen       8080;
        server_name  _;
        root   /usr/share/nginx/html;
        index  index.html;

        # Security headers
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header X-Content-Type-Options    "nosniff"    always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header X-XSS-Protection          "1; mode=block" always;

        # Health endpoint (used by Docker HEALTHCHECK + load balancers)
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # Long-cache hashed assets
        location ~* \.(?:js|css|woff2?|ttf|eot|otf|ico|png|jpe?g|gif|webp|avif|svg|mp4|webm)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # HTML — never cache, always revalidate
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }

        # SPA fallback: send unknown routes to index.html so client routing works.
        # For a non-SPA static site this is harmless — real files are served first.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Block hidden files (.git, .env, etc.)
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
