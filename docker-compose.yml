# Local development compose. Builds OR pulls images, brings up the full stack
# including the outer nginx that merges frontend + API onto a single port.

services:
  mariadb:
    image: mariadb:11
    container_name: portfolio_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-portfolio_db}
      MYSQL_USER: ${MYSQL_USER:-portfolio_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./site/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [portfolio_net]

  api:
    image: ghcr.io/${GITHUB_OWNER:-test37}/portfolio-api:${TAG:-latest}
    container_name: portfolio_api
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      PORT: 4200
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-portfolio_db}
      DB_USER: ${MYSQL_USER:-portfolio_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      ALPHA_VANTAGE_KEY: ${ALPHA_VANTAGE_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - api_uploads:/app/uploads
    networks: [portfolio_net]

  worker:
    image: ghcr.io/${GITHUB_OWNER:-test37}/portfolio-api:${TAG:-latest}
    container_name: portfolio_worker
    restart: unless-stopped
    command: ["node", "src/worker/index.js"]
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-portfolio_db}
      DB_USER: ${MYSQL_USER:-portfolio_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      ALPHA_VANTAGE_KEY: ${ALPHA_VANTAGE_KEY:-}
    networks: [portfolio_net]

  frontend:
    image: ghcr.io/${GITHUB_OWNER:-test37}/portfolio-frontend:${TAG:-latest}
    container_name: portfolio_frontend
    restart: unless-stopped
    networks: [portfolio_net]

  nginx:
    image: nginx:alpine
    container_name: portfolio_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8282}:80"
    depends_on: [api, frontend]
    volumes:
      - ./site/nginx/conf.d:/etc/nginx/conf.d:ro
      - api_uploads:/var/www/uploads:ro
    networks: [portfolio_net]

networks:
  portfolio_net:
    driver: bridge

volumes:
  mariadb_data:
  api_uploads:
