services:
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    network_mode: host
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      PORT: 4100
      DB_HOST: 127.0.0.1
      DB_PORT: 3307
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    volumes:
      - ./backend/uploads:/app/uploads

  worker:
    build: ./backend
    restart: unless-stopped
    network_mode: host
    command: node src/worker/index.js
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_HOST: 127.0.0.1
      DB_PORT: 3307
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}

  frontend:
    build: ./frontend
    restart: unless-stopped
    network_mode: host

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    network_mode: host
    depends_on:
      - api
      - frontend
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./backend/uploads:/var/www/uploads

volumes:
  mariadb_data:
