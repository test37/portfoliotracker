# Portainer stack file.
# Deploy via: Portainer → Stacks → Add Stack → Repository
#   Repository URL:  https://github.com/OWNER/portfoliotracker
#   Compose path:    stack.yml
# Set environment variables in the Portainer UI (GITHUB_OWNER, TAG, HOST_PORT, PUBLIC_HOST).

services:
  portfolio:
    image: ghcr.io/${GITHUB_OWNER}/portfoliotracker:${TAG:-latest}
    container_name: portfoliotracker
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portfoliotracker.rule=Host(`${PUBLIC_HOST:-portfolio.example.com}`)"
      - "traefik.http.routers.portfoliotracker.entrypoints=websecure"
      - "traefik.http.routers.portfoliotracker.tls.certresolver=letsencrypt"
      - "traefik.http.services.portfoliotracker.loadbalancer.server.port=8080"

networks:
  web:
    driver: bridge
