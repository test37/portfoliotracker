# Portainer stack — pulls all images from GHCR.
# No bind mounts to host filesystem. Fully self-contained.
#
# Required env vars (set in Portainer's "Environment variables" panel):
#   GITHUB_OWNER, MYSQL_ROOT_PASSWORD, MYSQL_DATABASE, MYSQL_USER, MYSQL_PASSWORD,
#   JWT_SECRET, ALPHA_VANTAGE_KEY (optional),
#   SMTP_HOST, SMTP_PORT, SMTP_SECURE, SMTP_USER, SMTP_PASS, SMTP_FROM,
#   APP_PORT (default 8282), TAG (default latest)

services:
  mariadb:
    image: ghcr.io/${GITHUB_OWNER}/portfolio-db:${TAG:-latest}
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [portfolio_net]

  api:
    image: ghcr.io/${GITHUB_OWNER}/portfolio-api:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      PORT: 4200
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ALPHA_VANTAGE_KEY: ${ALPHA_VANTAGE_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - api_uploads:/app/uploads
    networks: [portfolio_net]

  worker:
    image: ghcr.io/${GITHUB_OWNER}/portfolio-api:${TAG:-latest}
    restart: unless-stopped
    command: ["node", "src/worker/index.js"]
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      ALPHA_VANTAGE_KEY: ${ALPHA_VANTAGE_KEY:-}
    networks: [portfolio_net]

  frontend:
    image: ghcr.io/${GITHUB_OWNER}/portfolio-frontend:${TAG:-latest}
    restart: unless-stopped
    networks: [portfolio_net]

  nginx:
    image: ghcr.io/${GITHUB_OWNER}/portfolio-nginx:${TAG:-latest}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8282}:80"
    depends_on: [api, frontend]
    volumes:
      - api_uploads:/var/www/uploads:ro
    networks: [portfolio_net]

networks:
  portfolio_net:
    driver: bridge

volumes:
  mariadb_data:
  api_uploads:
